<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2fae8e" />
  <title>Спокій — щоденник тривожності</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("spokiy:theme");
        if (!t) t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
</head>
<body>
  <!-- AUTH / WELCOME -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">S</div>
      <h1 class="auth-title">Спокій</h1>
      <p class="auth-sub">Твій особистий простір, що допомагає бачити: тривога часто перебільшує, а страхи не завжди стають реальністю.</p>

      <div class="auth-fields">
        <label class="field">
          <span>Ім'я</span>
          <input id="auth-name" type="text" placeholder="Як до тебе звертатися?" autocomplete="name" />
        </label>
        <label class="field">
          <span>Email</span>
          <input id="auth-email" type="email" placeholder="you@email.com" autocomplete="email" />
        </label>
        <div class="field">
          <span>Стать</span>
          <div class="gender-pick" id="auth-gender">
            <button type="button" class="gender-opt" data-gender="female"><span class="gender-symbol">♀</span> Жінка</button>
            <button type="button" class="gender-opt" data-gender="male"><span class="gender-symbol">♂</span> Чоловік</button>
          </div>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="auth-email-btn">Створити акаунт з Email</button>
      <div class="auth-divider"><span>або</span></div>
      <div id="google-btn-box"></div>
      <button class="btn btn-google btn-block" id="auth-google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Продовжити з Google
      </button>
      <p class="auth-privacy">🔒 Усі дані зберігаються приватно на твоєму пристрої. Нічого не публікується без твоєї згоди.</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Меню">☰</button>
      <div class="topbar-title" id="topbar-title">Головна</div>
      <button class="crisis-pill" id="crisis-pill">SOS: мені зараз тривожно</button>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-logo">S</span>
        <span class="brand-name">Спокій</span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <button class="btn btn-danger btn-block" id="crisis-sidebar" style="margin-bottom:10px">SOS: мені зараз тривожно</button>
        <div class="user-chip" id="user-chip"></div>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <main class="content" id="view"></main>
  </div>

  <!-- Аудіо для верхньої музики настрою -->
  <audio id="audio" preload="none"></audio>

  <!-- Crisis overlay -->
  <div id="crisis-overlay" class="crisis-overlay hidden"></div>

  <!-- Guided calm overlay -->
  <div id="calm-overlay" class="crisis-overlay hidden"></div>

  <!-- Toasts -->
  <div id="toasts" class="toasts"></div>

  <!-- Modal -->
  <div id="modal-root" class="modal-root hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

<script src="js/content.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
